app = 'employerflow'
primary_region = 'fra'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  APP_NAME = 'EmployerFlow'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1