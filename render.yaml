# 100% free stack: Render Free Web Service + Neon Free Postgres (external)
# Deploy: https://dashboard.render.com/select-repo?repo=https://github.com/SVamseekar/employerflow
services:
  - type: web
    name: employerflow-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: EmployerFlow
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: EMPLOYER_CSV
        value: /app/data/master_employers.csv
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: CORS_ORIGINS
        sync: false