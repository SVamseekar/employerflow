# Render Blueprint — deploy at https://dashboard.render.com/select-repo
services:
  - type: web
    name: employerflow-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: EmployerFlow
      - key: DATABASE_URL
        fromDatabase:
          name: employerflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: employerflow-db
    plan: starter
    databaseName: employerflow
    user: employerflow