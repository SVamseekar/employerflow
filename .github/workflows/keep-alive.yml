# Pings the free Render instance every 14 minutes to prevent idle spin-down.
# Uses GitHub Actions free tier (~500 min/month for private repos — enough for this).
name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ secrets.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "Set RENDER_HEALTH_URL secret to your Render app URL + /api/health"
            exit 0
          fi
          curl -sf "$URL" || echo "Ping failed (service may be spinning up)"